<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title>Personal RAG Knowledge Base architecture</title>
  <desc>Documents flow through scanning, parsing and chunking into Chroma and BM25 indexes. Queries use both indexes, RRF fusion, context building, generation and citation checking. Evaluation and stats observe the same pipeline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0f172a" flood-opacity=".12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 30px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #64748b; }
      .lane { font: 700 14px "Segoe UI", "Microsoft YaHei", sans-serif; letter-spacing: 1px; fill: #475569; }
      .box-title { font: 700 16px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .box-text { font: 400 13px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #475569; }
      .white-title { font: 700 16px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #fff; }
      .white-text { font: 400 13px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #dbeafe; }
      .flow { fill: none; stroke: #64748b; stroke-width: 2.3; marker-end: url(#arrow); }
      .observe { fill: none; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 7 7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="720" rx="24" fill="url(#bg)"/>
  <text x="60" y="58" class="title">Personal RAG Knowledge Base</text>
  <text x="60" y="84" class="subtitle">离线索引、混合检索、带引用生成与可量化评估</text>

  <text x="60" y="133" class="lane">OFFLINE INDEXING</text>
  <rect x="48" y="150" width="1104" height="190" rx="20" fill="#fff" stroke="#dbe4f0" filter="url(#shadow)"/>

  <rect x="76" y="196" width="150" height="96" rx="16" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="151" y="229" text-anchor="middle" class="box-title">Documents</text>
  <text x="151" y="253" text-anchor="middle" class="box-text">Markdown / TXT</text>
  <text x="151" y="274" text-anchor="middle" class="box-text">Text PDF</text>

  <rect x="278" y="180" width="190" height="128" rx="16" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="373" y="213" text-anchor="middle" class="box-title">Ingest Pipeline</text>
  <text x="373" y="239" text-anchor="middle" class="box-text">Hash scanner</text>
  <text x="373" y="261" text-anchor="middle" class="box-text">Parser → Document</text>
  <text x="373" y="283" text-anchor="middle" class="box-text">Chunker + metadata</text>

  <rect x="520" y="196" width="170" height="96" rx="16" fill="#fff7ed" stroke="#fdba74"/>
  <text x="605" y="229" text-anchor="middle" class="box-title">Embedding Cache</text>
  <text x="605" y="253" text-anchor="middle" class="box-text">provider + model</text>
  <text x="605" y="274" text-anchor="middle" class="box-text">dimensions + hash</text>

  <rect x="748" y="174" width="168" height="72" rx="16" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="832" y="205" text-anchor="middle" class="box-title">Chroma</text>
  <text x="832" y="226" text-anchor="middle" class="box-text">Vector index</text>

  <rect x="748" y="262" width="168" height="58" rx="16" fill="#fdf4ff" stroke="#d8b4fe"/>
  <text x="832" y="287" text-anchor="middle" class="box-title">BM25</text>
  <text x="832" y="307" text-anchor="middle" class="box-text">Jieba tokens</text>

  <rect x="974" y="196" width="144" height="96" rx="16" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="1046" y="229" text-anchor="middle" class="box-title">Manifests</text>
  <text x="1046" y="253" text-anchor="middle" class="box-text">docs.json</text>
  <text x="1046" y="274" text-anchor="middle" class="box-text">chunks.jsonl</text>

  <path d="M226 244 H278" class="flow"/>
  <path d="M468 244 H520" class="flow"/>
  <path d="M690 228 H748" class="flow"/>
  <path d="M690 260 C716 260 716 291 748 291" class="flow"/>
  <path d="M916 210 H974" class="flow"/>

  <text x="60" y="392" class="lane">ONLINE RETRIEVAL &amp; ANSWERING</text>
  <rect x="48" y="408" width="1104" height="180" rx="20" fill="#fff" stroke="#dbe4f0" filter="url(#shadow)"/>

  <rect x="76" y="452" width="130" height="88" rx="16" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="141" y="485" text-anchor="middle" class="box-title">Question</text>
  <text x="141" y="510" text-anchor="middle" class="box-text">User query</text>

  <rect x="254" y="438" width="170" height="116" rx="16" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="339" y="470" text-anchor="middle" class="box-title">Hybrid Recall</text>
  <text x="339" y="496" text-anchor="middle" class="box-text">Vector Top-N</text>
  <text x="339" y="518" text-anchor="middle" class="box-text">BM25 Top-N</text>

  <rect x="472" y="452" width="130" height="88" rx="16" fill="url(#primary)"/>
  <text x="537" y="486" text-anchor="middle" class="white-title">RRF</text>
  <text x="537" y="511" text-anchor="middle" class="white-text">Rank fusion</text>

  <rect x="650" y="438" width="160" height="116" rx="16" fill="#eef2ff" stroke="#a5b4fc"/>
  <text x="730" y="470" text-anchor="middle" class="box-title">Context</text>
  <text x="730" y="496" text-anchor="middle" class="box-text">Top Chunks</text>
  <text x="730" y="518" text-anchor="middle" class="box-text">[C1] ... [Cn]</text>

  <rect x="858" y="438" width="130" height="116" rx="16" fill="#fff7ed" stroke="#fdba74"/>
  <text x="923" y="470" text-anchor="middle" class="box-title">Generator</text>
  <text x="923" y="496" text-anchor="middle" class="box-text">Mock</text>
  <text x="923" y="518" text-anchor="middle" class="box-text">ModelScope</text>

  <rect x="1036" y="438" width="92" height="116" rx="16" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="1082" y="476" text-anchor="middle" class="box-title">Citation</text>
  <text x="1082" y="499" text-anchor="middle" class="box-title">Checker</text>
  <text x="1082" y="526" text-anchor="middle" class="box-text">Answer</text>

  <path d="M206 496 H254" class="flow"/>
  <path d="M424 496 H472" class="flow"/>
  <path d="M602 496 H650" class="flow"/>
  <path d="M810 496 H858" class="flow"/>
  <path d="M988 496 H1036" class="flow"/>

  <rect x="244" y="627" width="712" height="58" rx="18" fill="#0f172a"/>
  <text x="600" y="652" text-anchor="middle" class="white-title">Evaluation &amp; Operations</text>
  <text x="600" y="674" text-anchor="middle" class="white-text">Hit@K · MRR · Citation Coverage · Stats · Incremental Index · Rebuild</text>
  <path d="M600 627 V588" class="observe"/>
  <path d="M832 627 C832 606 832 593 832 340" class="observe"/>
</svg>

